name: Docker build & scan

# Builds the Zafin fork image from source, scans it for vulnerabilities
# (compliance evidence), and publishes to GHCR on tagged releases.
#
# - PR / push to main : build + Trivy scan only (proves the build works)
# - tag v*            : build + Trivy scan + push to ghcr.io
# - manual dispatch   : build + scan (no push) for ad-hoc testing

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      security-events: write # upload Trivy SARIF to the Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Full history: the Dockerfile runs `git archive HEAD:apps/dbagent`.
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Only log in / publish on version tags; main & PR builds stay local.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on non-PR)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }} # publish only on tags
          load: true # also keep image in local store so Trivy can scan it
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run Trivy directly from its official image rather than the composite
      # action — the action's transitive `uses:` pins break job setup. A plain
      # `run:` step has nothing to resolve, so it can never block the build.
      - name: Trivy vulnerability scan
        continue-on-error: true # scan is compliance evidence, not a build gate
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$GITHUB_WORKSPACE:/out" \
            aquasec/trivy:0.58.0 image \
            --format sarif --output /out/trivy-results.sarif \
            --severity CRITICAL,HIGH --ignore-unfixed \
            "${{ fromJSON(steps.meta.outputs.json).tags[0] }}"

      - name: Upload scan results to Security tab
        if: hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
